[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
    "battlechain-lib/=lib/battlechain-lib/src/",
]

[rpc_endpoints]
battlechain = "https://testnet.battlechain.com"

[etherscan]
battlechain = { key = "not-required", url = "https://block-explorer-app-mu.vercel.app/" }

[lint]
exclude_lints = ["mixed-case-variable"]
ignore = ["test/**/*"]
